# Cloud Build CI/CD for ADK Workflows
# Reference template — package_workflow.py generates project-specific copies.

steps:
  - name: python:3.11
    id: install
    entrypoint: pip
    args: ["install", "-r", "requirements.txt"]

  - name: python:3.11
    id: lint
    entrypoint: ruff
    args: ["check", "app/", "tests/"]

  # Security: scan for leaked secrets
  - name: ghcr.io/zricethezav/gitleaks
    id: secrets-scan
    args:
      - "detect"
      - "--source=."
      - "--report-format=json"
      - "--report-path=gitleaks-report.json"
      - "--verbose"

  # Security: scan dependencies for known vulnerabilities
  - name: python:3.11
    id: vuln-scan
    entrypoint: bash
    args:
      - "-c"
      - |
        pip install pip-audit
        pip-audit --requirement requirements.txt --format json --output pip-audit-report.json
    allowFailure: true  # Don't block on dependency audit (informational)

  - name: python:3.11
    id: test
    entrypoint: pytest
    args: ["tests/", "-v", "--junitxml=test-results.xml"]
    env:
      - "GOOGLE_API_KEY=$_GOOGLE_API_KEY"

  - name: python:3.11
    id: eval
    entrypoint: python
    args: ["evals/test_harness.py"]
    env:
      - "GOOGLE_API_KEY=$_GOOGLE_API_KEY"

  - name: gcr.io/cloud-builders/docker
    id: build
    args:
      - "build"
      - "-t"
      - "$_ARTIFACT_REGISTRY/$PROJECT_ID/$_SERVICE_NAME:$COMMIT_SHA"
      - "."

  - name: gcr.io/cloud-builders/docker
    id: push
    args:
      - "push"
      - "$_ARTIFACT_REGISTRY/$PROJECT_ID/$_SERVICE_NAME:$COMMIT_SHA"

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy
    entrypoint: gcloud
    args:
      - "run"
      - "deploy"
      - "$_SERVICE_NAME"
      - "--image=$_ARTIFACT_REGISTRY/$PROJECT_ID/$_SERVICE_NAME:$COMMIT_SHA"
      - "--region=$_REGION"
      - "--allow-unauthenticated"

substitutions:
  _SERVICE_NAME: my-workflow
  _REGION: us-central1
  _ARTIFACT_REGISTRY: us-central1-docker.pkg.dev

images:
  - "$_ARTIFACT_REGISTRY/$PROJECT_ID/$_SERVICE_NAME:$COMMIT_SHA"

timeout: 1800s
